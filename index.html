<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal · Audio</title>
  <style>
    /* — reset básico + minimalista — */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f7fa;  /* fondo neutro muy suave */
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem 1.5rem;
      background: transparent;  /* sin caja, solo el botón y la letra */
      border-radius: 0;
      box-shadow: none;
    }

    /* letra 'C' — mínima, sin peso visual excesivo */
    .letter {
      font-size: 4.5rem;
      font-weight: 300;        /* delgada, minimal */
      letter-spacing: -0.02em;
      color: #1e293b;          /* gris oscuro, no negro puro */
      line-height: 1;
      margin: 0;
      opacity: 0.85;
      transition: opacity 0.2s;
      user-select: none;
    }

    /* botón circular grande — solo azul, sin sombras pesadas */
    .btn-audio {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: none;
      background: #0a7bff;      /* azul limpio, sin degradados */
      color: white;
      font-size: 1.8rem;
      font-weight: 450;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      box-shadow: 0 2px 12px rgba(10, 123, 255, 0.20); /* sombra azul muy sutil */
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
      font-family: inherit;
      background-color: #0a7bff;  /* refuerzo */
    }

    /* interacción minimal: solo un ligero oscurecimiento y escala */
    .btn-audio:hover {
      background: #0066e6;
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(10, 123, 255, 0.25);
    }

    .btn-audio:active {
      transform: scale(0.94);
      background: #0052c7;
      box-shadow: 0 1px 6px rgba(10, 123, 255, 0.15);
      transition-duration: 0.06s;
    }

    /* foco accesible pero discreto */
    .btn-audio:focus-visible {
      outline: 2px solid #0a7bff;
      outline-offset: 6px;
    }

    /* — estado "paused" / "playing" se maneja solo con textContent — */
    /* todo limpio, sin clases extra */

    /* responsive: el botón se ajusta en pantallas pequeñas */
    @media (max-width: 480px) {
      .btn-audio {
        width: 160px;
        height: 160px;
        font-size: 1.5rem;
      }
      .letter {
        font-size: 3.6rem;
      }
    }

    @media (max-width: 360px) {
      .btn-audio {
        width: 140px;
        height: 140px;
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="player">
    <!-- letra C, mínima y sin adornos -->
    <span class="letter">C</span>

    <!-- botón grande, azul, circular -->
    <button class="btn-audio" id="playBtn" type="button">Play</button>

    <!-- elemento de audio oculto, sin controles nativos -->
    <audio id="audioElement" src="C.wav" preload="auto"></audio>
  </div>

  <script>
    (function() {
      const audio = document.getElementById('audioElement');
      const btn = document.getElementById('playBtn');

      // Prevenir cualquier error si el audio no existe (por si acaso)
      if (!audio || !btn) return;

      // Función principal: reproduce o corta, y cambia el texto
      function togglePlay() {
        if (audio.paused) {
          // Reproducir
          audio.play().catch(err => {
            // Silencio: si hay error (ej. archivo no encontrado) no rompe la UI
            console.warn('Audio no disponible:', err);
            // Podríamos mostrar un estado, pero mantenemos minimalista
            // (opcional: mostrar "error" muy sutil, pero no lo hacemos para mantener simple)
          });
          btn.textContent = 'Pausa';
        } else {
          // Cortar (pausar)
          audio.pause();
          btn.textContent = 'Play';
        }
      }

      // Evento click en el botón
      btn.addEventListener('click', togglePlay);

      // Cuando el audio termina naturalmente, volver a "Play"
      audio.addEventListener('ended', function() {
        btn.textContent = 'Play';
        // el audio queda en pausa (en realidad terminó)
        // pero aseguramos que el estado interno coincida
        // (audio.paused será true después de ended)
      });

      // (Opcional) si el usuario pausa desde el navegador (no aplica porque no hay controles)
      // pero por si el audio se corta por otros medios, sincronizamos
      audio.addEventListener('pause', function() {
        // solo si no ha terminado (para no pisar el 'ended')
        if (!audio.ended) {
          btn.textContent = 'Play';
        }
      });

      // (Opcional) si el audio se reanuda por otros medios (no debería)
      audio.addEventListener('play', function() {
        btn.textContent = 'Pausa';
      });

      // Comportamiento extra: si el audio falla al cargar, el botón sigue funcional
      // pero no se traba.  No mostramos mensajes para mantener minimalismo.
    })();
  </script>
</body>
</html>
