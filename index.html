<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal · Notas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f7fa;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 600px;
    }

    .slider-container {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 32px;
      background: #ffffff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
    }

    .slider-track {
      display: flex;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .slide {
      min-width: 100%;
      padding: 3rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: white;
    }

    .letter {
      font-size: 5rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: #1e293b;
      line-height: 1;
      user-select: none;
      opacity: 0.9;
    }

    .note-description {
      font-size: 1rem;
      font-weight: 400;
      color: #64748b;
      letter-spacing: 0.01em;
    }

    .btn-audio {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      color: white;
      font-size: 1.6rem;
      font-weight: 450;
      cursor: pointer;
      transition: transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .btn-audio:hover {
      transform: scale(1.02);
    }

    .btn-audio:active {
      transform: scale(0.94);
    }

    .btn-audio:focus-visible {
      outline: 2px solid #0a7bff;
      outline-offset: 6px;
    }

    .nav-controls {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.5rem;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid #d1d9e6;
      padding: 0.6rem 1.8rem;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 450;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.02);
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .nav-btn:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }

    .nav-btn:active {
      transform: scale(0.96);
      background: #e2e8f0;
    }

    .nav-btn:disabled {
      opacity: 0.3;
      pointer-events: none;
      transform: none;
    }

    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 0.25rem 0 0.5rem;
      flex-wrap: wrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cbd5e1;
      transition: background 0.25s, width 0.25s;
    }

    .dot.active {
      background: #0a7bff;
      width: 24px;
      border-radius: 12px;
    }

    @media (max-width: 480px) {
      .btn-audio { width: 140px; height: 140px; font-size: 1.3rem; }
      .letter { font-size: 3.8rem; }
      .slide { padding: 2rem 1rem; }
      .nav-btn { padding: 0.4rem 1.2rem; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="player">
    <div class="slider-container">
      <div class="slider-track" id="sliderTrack">
        <!-- 32 slides generadas dinámicamente con colores únicos -->
      </div>
    </div>

    <div class="dots" id="dotsContainer"></div>

    <div class="nav-controls">
      <button class="nav-btn" id="prevBtn" disabled>‹ Anterior</button>
      <button class="nav-btn" id="nextBtn">Siguiente ›</button>
    </div>
  </div>

  <script>
    (function() {
      // Orden exacto solicitado: de menor a mayor (F2 → C5)
      const noteFiles = [
        "F2.wav", "F2S.wav", "G2.wav", "G2S.wav", "A2.wav", "A2S.wav", "B2.wav",
        "C3.wav", "C3S.wav", "D3.wav", "D3S.wav", "E3.wav",
        "F3.wav", "F3S.wav", "G3.wav", "G3S.wav", "A3.wav", "A3S.wav", "B3.wav",
        "C4.wav", "C4S.wav", "D4.wav", "D4S.wav", "E4.wav",
        "F4.wav", "F4S.wav", "G4.wav", "G4S.wav", "A4.wav", "A4S.wav", "B4.wav",
        "C5.wav"
      ];

      // 32 colores únicos y vibrantes
      const colorPalette = [
        "#E74C3C", "#E67E22", "#F1C40F", "#2ECC71", "#1ABC9C", "#3498DB",
        "#2980B9", "#9B59B6", "#8E44AD", "#2C3E50", "#D35400", "#C0392B",
        "#16A085", "#27AE60", "#2980B9", "#8E44AD", "#2C3E50", "#F39C12",
        "#D35400", "#C0392B", "#1ABC9C", "#2ECC71", "#3498DB", "#9B59B6",
        "#E67E22", "#E74C3C", "#F1C40F", "#16A085", "#27AE60", "#2980B9",
        "#8E44AD", "#2C3E50"
      ];

      const track = document.getElementById('sliderTrack');
      const dotsContainer = document.getElementById('dotsContainer');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      track.innerHTML = '';
      dotsContainer.innerHTML = '';

      // Construir slides y dots
      noteFiles.forEach((file, index) => {
        let displayName = file.replace('.wav', '');
        let noteDisplay = displayName;
        if (displayName.includes('S')) {
          noteDisplay = displayName.replace('S', '♯');
        }
        // Frecuencia aproximada (solo decorativa)
        const freq = (261.6 * Math.pow(2, (index % 12) / 12)).toFixed(1);
        const description = `${noteDisplay} · ${freq} Hz`;

        const slide = document.createElement('div');
        slide.className = 'slide';
        slide.dataset.index = index;
        slide.dataset.note = displayName;

        const bgColor = colorPalette[index % colorPalette.length];

        const letterSpan = document.createElement('span');
        letterSpan.className = 'letter';
        letterSpan.textContent = noteDisplay;

        const descSpan = document.createElement('span');
        descSpan.className = 'note-description';
        descSpan.textContent = description;

        const btn = document.createElement('button');
        btn.className = 'btn-audio';
        btn.textContent = 'Play';
        btn.style.background = bgColor;
        btn.style.boxShadow = `0 2px 12px ${bgColor}44`;
        btn.dataset.audio = file;

        const audio = document.createElement('audio');
        audio.preload = 'auto';
        audio.src = file;

        slide.appendChild(letterSpan);
        slide.appendChild(descSpan);
        slide.appendChild(btn);
        slide.appendChild(audio);
        track.appendChild(slide);

        const dot = document.createElement('span');
        dot.className = 'dot' + (index === 0 ? ' active' : '');
        dot.dataset.index = index;
        dotsContainer.appendChild(dot);
      });

      const slides = track.querySelectorAll('.slide');
      const dots = dotsContainer.querySelectorAll('.dot');
      const total = slides.length;
      let currentIndex = 0;
      let isTransitioning = false;

      function goTo(index, pushState = true) {
        if (isTransitioning) return;
        if (index < 0 || index >= total) return;
        if (index === currentIndex) return;

        isTransitioning = true;
        currentIndex = index;

        track.style.transform = `translateX(-${currentIndex * 100}%)`;

        dots.forEach((dot, i) => {
          dot.classList.toggle('active', i === currentIndex);
        });

        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === total - 1;

        if (pushState) {
          const note = slides[currentIndex].dataset.note;
          const newUrl = `${window.location.pathname}?nota=${encodeURIComponent(note)}`;
          history.pushState({ index: currentIndex }, '', newUrl);
        }

        slides.forEach((slide, i) => {
          const audio = slide.querySelector('audio');
          const btn = slide.querySelector('.btn-audio');
          if (audio) {
            if (i === currentIndex) {
              btn.textContent = audio.paused ? 'Play' : 'Pausa';
            } else {
              if (!audio.paused) audio.pause();
              btn.textContent = 'Play';
            }
          }
        });

        setTimeout(() => {
          isTransitioning = false;
        }, 50);
      }

      prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) goTo(currentIndex - 1);
      });

      nextBtn.addEventListener('click', () => {
        if (currentIndex < total - 1) goTo(currentIndex + 1);
      });

      dots.forEach((dot, i) => {
        dot.addEventListener('click', () => {
          if (i !== currentIndex) goTo(i);
        });
      });

      slides.forEach((slide) => {
        const audio = slide.querySelector('audio');
        const btn = slide.querySelector('.btn-audio');
        if (!audio || !btn) return;

        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const slideIndex = parseInt(slide.dataset.index);

          if (slideIndex !== currentIndex) {
            goTo(slideIndex, false);
            setTimeout(() => {
              slides.forEach((s) => {
                const a = s.querySelector('audio');
                const b = s.querySelector('.btn-audio');
                if (a && a !== audio) {
                  a.pause();
                  b.textContent = 'Play';
                }
              });
              if (audio.paused) {
                audio.play().catch(() => {});
                btn.textContent = 'Pausa';
              } else {
                audio.pause();
                btn.textContent = 'Play';
              }
            }, 50);
            return;
          }

          if (audio.paused) {
            slides.forEach((s) => {
              const a = s.querySelector('audio');
              const b = s.querySelector('.btn-audio');
              if (a && a !== audio && !a.paused) {
                a.pause();
                b.textContent = 'Play';
              }
            });
            audio.play().catch(() => {});
            btn.textContent = 'Pausa';
          } else {
            audio.pause();
            btn.textContent = 'Play';
          }
        });

        audio.addEventListener('ended', () => {
          btn.textContent = 'Play';
        });

        audio.addEventListener('pause', () => {
          if (!audio.ended) {
            btn.textContent = 'Play';
          }
        });
      });

      function restoreFromURL() {
        const params = new URLSearchParams(window.location.search);
        const nota = params.get('nota');
        if (nota) {
          let foundIndex = -1;
          slides.forEach((slide, i) => {
            if (slide.dataset.note === nota) foundIndex = i;
          });
          if (foundIndex !== -1 && foundIndex !== currentIndex) {
            goTo(foundIndex, false);
          }
        }
      }

      window.addEventListener('popstate', (event) => {
        if (event.state && event.state.index !== undefined) {
          const idx = event.state.index;
          if (idx >= 0 && idx < total && idx !== currentIndex) {
            goTo(idx, false);
          }
        } else {
          const params = new URLSearchParams(window.location.search);
          const nota = params.get('nota');
          if (nota) {
            let foundIndex = -1;
            slides.forEach((slide, i) => {
              if (slide.dataset.note === nota) foundIndex = i;
            });
            if (foundIndex !== -1 && foundIndex !== currentIndex) {
              goTo(foundIndex, false);
            }
          }
        }
      });

      slides.forEach((slide) => {
        const audio = slide.querySelector('audio');
        const btn = slide.querySelector('.btn-audio');
        if (audio) {
          audio.pause();
          audio.currentTime = 0;
        }
        if (btn) btn.textContent = 'Play';
      });

      goTo(0, false);
      restoreFromURL();

      prevBtn.disabled = true;
      nextBtn.disabled = total === 1;
      if (total === 1) nextBtn.disabled = true;

    })();
  </script>
</body>
</html>
